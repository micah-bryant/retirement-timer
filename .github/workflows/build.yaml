name: Build executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:
    branches:
      - main


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: make check
      - run: make test

  build:
    needs: test
    uses: ./.github/workflows/_build-artifacts.yml
